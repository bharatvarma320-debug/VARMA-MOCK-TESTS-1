<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VARMA TESTS | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #d32f2f, #ff7043);
      color: #222;
    }

    .login-box {
      width: 420px;
      background: #fff;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }

    .logo {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #d32f2f;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #d32f2f;
    }

    .password-box {
      position: relative;
    }

    .password-box span {
      position: absolute;
      right: 12px;
      top: 12px;
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }

    .extra {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin: 12px 0 18px;
    }

    .extra a {
      color: #d32f2f;
      text-decoration: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #d32f2f;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #b71c1c;
    }

    .error {
      color: #d32f2f;
      margin-top: 10px;
      min-height: 20px;
      text-align: center;
      font-size: 14px;
    }

    .link {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
    }

    .link a {
      color: #d32f2f;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">📝 VARMA TESTS</div>
    <div class="subtitle">Practice Today, Succeed Tomorrow</div>

    <form id="loginForm">
      <div class="field">
        <label for="phone">Phone Number</label>
        <input
          type="text"
          id="phone"
          maxlength="10"
          placeholder="Enter Mobile Number"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-box">
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
          />
          <span onclick="togglePassword()" title="Toggle Password">👁</span>
        </div>
      </div>

      <div class="extra">
        <label><input type="checkbox" /> Remember Me</label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit">LOGIN</button>
      <p class="error" id="error"></p>
    </form>

    <div class="link">
      New user? <a href="register.html">Create Account</a>
    </div>
  </div>

  <script src="../js/auth.js"></script>

  <script>
    function togglePassword() {
      const p = document.getElementById("password");
      p.type = p.type === "password" ? "text" : "password";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const errorBox = document.getElementById("error");
      errorBox.textContent = "";

      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();

      if (phone.length !== 10 || isNaN(phone)) {
        errorBox.textContent = "Enter valid 10 digit Mobile Number";
        return;
      }

      if (password.length < 6) {
        errorBox.textContent = "Password must be at least 6 characters";
        return;
      }

      try {
        const user = await verifyLogin(phone, password);

        if (!user) {
          errorBox.textContent = "Invalid Phone Number or Password";
          return;
        }

        setCurrentUser(user);
        window.location.href = "../index.html";
      } catch (err) {
        errorBox.textContent = "Login failed. Please try again.";
        console.error(err);
      }
    });
