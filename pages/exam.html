<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARMA TESTS - Exam</title>

    <link rel="stylesheet" href="../css/exam.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header">

    <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        VARMA TESTS
    </div>

    <div class="exam-title" id="examTitle">
        Army GD Mock Test
    </div>

    <div class="timer">
        <i class="fa-solid fa-clock"></i>
        <span id="timer">60:00</span>
    </div>

</header>

<!-- MAIN -->
<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

        <div class="section-name" id="section">
            General Knowledge
        </div>

        <div class="question-box">
            <h2 id="question">
                Loading Question...
            </h2>
        </div>

        <div id="options"></div>

        <div class="buttons">

            <button id="prevBtn">
                <i class="fa-solid fa-arrow-left"></i>
                Previous
            </button>

            <button id="skipBtn">
                Skip
            </button>

            <button id="nextBtn">
                Next
                <i class="fa-solid fa-arrow-right"></i>
            </button>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <h3>Question Palette</h3>

        <div id="palette">

            <!-- Generated by JavaScript -->

        </div>

        <button id="submitBtn">
            Submit Test
        </button>

        <div class="legend">

            <h4>Legend</h4>

            <p>🟢 Answered</p>
            <p>🟠 Review</p>
            <p>⚪ Not Visited</p>

        </div>

    </div>

</div>

<!-- LOAD QUESTIONS FIRST -->
<script src="../js/armyData.js"></script>

<!-- THEN LOAD QUIZ ENGINE -->
<script src="../js/exam.js"></script>

</body>
</html>
